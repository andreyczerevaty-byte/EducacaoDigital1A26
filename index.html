<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Blog Tech</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        header {
            background-color: #183C63;
            color: #FFFFFF;
            text-align: center;
            max-width: 800px;
            margin: 20px auto;
            padding: 16px;
        }

        main {
            background-color: #FFFFFF;
            color: #183C63;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
        }

        /* cores tipo marca-texto */
        h2 {
            background-color: #fff176; /* amarelo marca-texto */
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
        }

        strong {
            background-color: #a5d6a7; /* verde marca-texto */
            padding: 2px 6px;
            border-radius: 4px;
        }

        p {
            line-height: 1.6;
        }
    </style>
</head>

<body>

    <header>
        <h1>Meu Blog Tech</h1>
        <p>Vou compartilhar conhecimentos sobre tecnologia e programação.</p>
    </header>

    <main>
        <h2>Meu primeiro post</h2>

        <p><strong>Por: Andrey Czerevaty</strong></p>

        <p>
            Bem-vindo ao meu blog! Aqui vou compartilhar dicas de programação,
            curiosidades sobre tecnologia e experiências do mundo da informática.
        </p>
    </main>

</body>
</html>
